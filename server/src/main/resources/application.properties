spring.application.name=DA-Backend

spring.config.import=file:.env[.properties]

server.port=${APPLICATION_PORT:8080}

spring.ldap.domain=tgm.ac.at
spring.ldap.urls=ldap://dc-01.tgm.ac.at
spring.ldap.base=OU=tgm,DC=tgm,DC=ac,DC=at
spring.ldap.username=${AD_USER}
spring.ldap.password=${AD_PASSWORD}
# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.ldap=DEBUG
logging.level.org.springframework.boot.autoconfigure.security=DEBUG

# SpringDoc
springdoc.show-login-endpoint=true
springdoc.swagger-ui.csrf.enabled=true
springdoc.swagger-ui.url=../v3/api-docs
springdoc.swagger-ui.config-url=../v3/api-docs/swagger-config
secret=${SECRET:JustDoIT}
# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
# SQL-Initialisierung
spring.sql.init.mode=never
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# Admins
admins=${APPLICATION_ADMINS:}

# OAuth2 client
spring.security.oauth2.client.registration.keycloak.provider=keycloak
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.client-id=${OIDC_CLIENT_ID}
spring.security.oauth2.client.registration.keycloak.client-secret=${OIDC_CLIENT_SECRET}
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email,roles
spring.security.oauth2.client.provider.keycloak.issuer-uri=${OIDC_DOMAIN}/realms/master

# Frontend
frontend-uri=${FRONTEND_DOMAIN:-http://localhost:5173}
backend-uri=${BACKEND_DOMAIN:-http://localhost:8080}